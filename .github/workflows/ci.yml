name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: cs336_rag
          POSTGRES_USER: cs336
          POSTGRES_PASSWORD: cs336
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cs336 -d cs336_rag"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: cs336_rag
      DB_USER: cs336
      DB_PASSWORD: cs336
      OPENAI_KEY: test-key-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests (unit + integration)
        run: uv run pytest -v --cov --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: cs336-rag-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the image (CLI help, no services needed)
        run: docker run --rm cs336-rag-app:ci cs336-rag --help
