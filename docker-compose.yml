# Full stack: the FastAPI app, its pgvector-enabled Postgres, and a Grafana
# dashboard over the telemetry tables. `docker compose up` brings up all three.
#
# First run only, to populate the knowledge base (needs OPENAI_KEY):
#   docker compose run --rm app cs336-rag ingest
services:
  app:
    build: .
    container_name: cs336-rag-app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      OPENAI_KEY: ${OPENAI_KEY:?set OPENAI_KEY in your .env}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.nan.builders/v1}
      CHAT_MODEL: ${CHAT_MODEL:-qwen3.6}
      JUDGE_MODEL: ${JUDGE_MODEL:-deepseek-v4-flash}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      RERANK_MODEL: ${RERANK_MODEL:-rerank}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper}
      RETRIEVAL_METHOD: ${RETRIEVAL_METHOD:-vector}
      RAG_PROMPT_VARIANT: ${RAG_PROMPT_VARIANT:-grounded}
      RAG_CONTEXT_SIZE: ${RAG_CONTEXT_SIZE:-5}
      CHAT_DISABLE_THINKING: ${CHAT_DISABLE_THINKING:-true}
      RAG_REWRITE_QUERY: ${RAG_REWRITE_QUERY:-false}
      CHUNK_MAX_CHARS: ${CHUNK_MAX_CHARS:-1800}
      CHUNK_OVERLAP_CHARS: ${CHUNK_OVERLAP_CHARS:-300}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-64}
      DATA_DIR: ${DATA_DIR:-data}
      PLAYLIST_ID: ${PLAYLIST_ID:-PLoROMvodv4rMqXOcazWaTUHhq-yembLCV}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-cs336_rag}
      DB_USER: ${DB_USER:-cs336}
      DB_PASSWORD: ${DB_PASSWORD:-cs336}
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    container_name: cs336-rag-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-cs336_rag}
      POSTGRES_USER: ${DB_USER:-cs336}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cs336}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cs336} -d ${DB_NAME:-cs336_rag}"]
      interval: 5s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.3.0
    container_name: cs336-rag-grafana
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    environment:
      # datasource provisioning reads these (see grafana/provisioning/datasources)
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-cs336_rag}
      DB_USER: ${DB_USER:-cs336}
      DB_PASSWORD: ${DB_PASSWORD:-cs336}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

volumes:
  postgres_data:
  grafana_data:
